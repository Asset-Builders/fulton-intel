name: Scrape Fulton County data

on:
  schedule:
    # Run daily at 9:00 UTC (4:00 AM ET) — adjust as needed
    - cron: '0 9 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scrapers/requirements.txt

      - name: Run scrapers
        env:
          FULTON_GIS_ENABLED: ${{ vars.FULTON_GIS_ENABLED }}
          FULTON_GIS_MAX: ${{ vars.FULTON_GIS_MAX }}
          FULTON_SHERIFF_ENABLED: ${{ vars.FULTON_SHERIFF_ENABLED }}
          FULTON_SHERIFF_PDF_URL: ${{ vars.FULTON_SHERIFF_PDF_URL }}
          FULTON_LEGAL_ENABLED: ${{ vars.FULTON_LEGAL_ENABLED }}
          FULTON_ACCELA_ENABLED: ${{ vars.FULTON_ACCELA_ENABLED }}
          FULTON_GSCCCA_ENABLED: ${{ vars.FULTON_GSCCCA_ENABLED }}
          GSCCCA_USERNAME: ${{ secrets.GSCCCA_USERNAME }}
          GSCCCA_PASSWORD: ${{ secrets.GSCCCA_PASSWORD }}
        run: |
          cd scrapers
          python run_all.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/records.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update records.json [skip ci]"
            git push
          fi
